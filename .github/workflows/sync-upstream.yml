name: Sync Upstream

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SYNC_PAT }}

      - name: Configure git and add upstream
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/wakatime/vscode-wakatime.git || true
          git fetch upstream +master:refs/remotes/upstream/master '+refs/tags/v*:refs/tags/v*'

      - name: Check if upstream has new changes
        id: check
        run: |
          git fetch origin +main:refs/remotes/origin/main
          git checkout -B main origin/main
          CHERRY_OUTPUT=$(git cherry main upstream/master)
          BEHIND=$(printf '%s\n' "$CHERRY_OUTPUT" | grep -c '^+' || true)
          echo "behind=$BEHIND" >> "$GITHUB_OUTPUT"
          echo "upstream/master has $BEHIND patch(es) not already in main"

      - name: Build sync branch (main + upstream)
        if: steps.check.outputs.behind != '0'
        id: merge
        run: |
          git checkout -B sync-upstream main
          if git merge --no-edit upstream/master; then
            CONFLICTS=false
            echo "conflicts=false" >> "$GITHUB_OUTPUT"
          else
            CONFLICTS=true
            echo "conflicts=true" >> "$GITHUB_OUTPUT"
            echo "Conflicted files:"
            git diff --name-only --diff-filter=U | tee /tmp/sync-upstream-conflicts.txt
            {
              echo "conflict_files<<EOF"
              cat /tmp/sync-upstream-conflicts.txt
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            git merge --abort
            git commit --allow-empty -m "Review upstream/master sync conflicts"
          fi
          if [ "$CONFLICTS" = "false" ] && git diff --quiet main HEAD; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "sync-upstream has no file changes compared with main; skipping PR."
            exit 0
          fi
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          git push origin HEAD:sync-upstream --force-with-lease

      - name: Open or update Pull Request
        if: steps.check.outputs.behind != '0' && steps.merge.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.SYNC_PAT }}
          CONFLICT_FILES: ${{ steps.merge.outputs.conflict_files }}
        run: |
          BODY="Automated merge of \`wakatime/vscode-wakatime@master\` into \`main\`."
          if [ "${{ steps.merge.outputs.conflicts }}" = "true" ]; then
            BODY="Upstream changes conflict with \`main\`. This PR is a review placeholder and intentionally does not include the conflicted upstream file changes yet."
            BODY="$BODY"$'\n\nTo review and resolve locally:'
            BODY="$BODY"$'\n\n```bash\ngh pr checkout sync-upstream\nnpm run review-pr\ncode .\n```'
            BODY="$BODY"$'\n\nAfter resolving conflicts:'
            BODY="$BODY"$'\n\n```bash\ngit add -A\ngit commit\ngit push --force-with-lease origin HEAD:sync-upstream\n```'
            BODY="$BODY"$'\n\nConflicted files from the attempted merge:'
            BODY="$BODY"$'\n\n```\n'"$CONFLICT_FILES"$'\n```'
          fi
          REPO="${{ github.repository }}"
          OWNER="${REPO%%/*}"
          PR_NUMBER=$(gh api --method GET "repos/$REPO/pulls" \
            -f state=open -f base=main -f head="$OWNER:sync-upstream" \
            --jq '.[0].number // ""')
          if [ -z "$PR_NUMBER" ]; then
            gh api --method POST "repos/$REPO/pulls" \
              -f title="Sync upstream changes" -f base=main -f head=sync-upstream -f body="$BODY"
          else
            gh api --method PATCH "repos/$REPO/pulls/$PR_NUMBER" -f body="$BODY"
          fi
